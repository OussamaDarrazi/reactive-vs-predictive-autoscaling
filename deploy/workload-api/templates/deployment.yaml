apiVersion: apps/v1
kind: Deployment
metadata:
  name: workload-api
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: workload-api
  template:
    metadata:
      labels:
        app: workload-api
    spec:
      containers:
        - name: workload-api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000