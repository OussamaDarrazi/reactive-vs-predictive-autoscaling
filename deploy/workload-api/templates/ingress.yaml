{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: workload-api
spec:
  ingressClassName: traefik
  rules:
      http:
        paths:
          - path: {{ .Values.ingress.path }}
            pathType: Prefix
            backend:
              service:
                name: workload-api
                port:
                  number: 8000
{{- end }}
